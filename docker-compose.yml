version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: medflow_db
    environment:
      POSTGRES_DB: medflow
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: medflow123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medflow -d medflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: medflow_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://medflow:medflow123@db:5432/medflow
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: "*"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm run db:migrate && npm run dev"

volumes:
  pgdata:
